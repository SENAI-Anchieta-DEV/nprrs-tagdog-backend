services:
  - type: web
    name: nprrs-tagdog-backend
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_HOST
        fromDatabase:
          name: nprrs-tagdog-backend-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: nprrs-tagdog-backend-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: nprrs-tagdog-backend-db
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: nprrs-tagdog-backend-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: nprrs-tagdog-backend-db
          property: password
      - key: SECURITY_JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
#      - key: APP_PUBLIC_BASE_URL
#        sync: false
      - key: APP_BOOTSTRAP_ADMIN_ENABLED
        value: "false"
      - key: APP_BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: APP_BOOTSTRAP_ADMIN_PASSWORD
        sync: false
#      - key: APP_STORAGE_PROVIDER
#        value: firebase
#      - key: APP_STORAGE_LOCAL_BASE_PATH
#        value: uploads
#      - key: APP_STORAGE_LOCAL_PUBLIC_PATH
#        value: /uploads
#      - key: APP_STORAGE_FIREBASE_BUCKET
#        sync: false
#      - key: APP_STORAGE_FIREBASE_PROJECT_ID
#        sync: false
#      - key: APP_STORAGE_FIREBASE_CREDENTIALS_BASE64
#        sync: false
#      - key: APP_STORAGE_FIREBASE_CREDENTIALS_JSON
#        sync: false
#      - key: APP_STORAGE_FIREBASE_FOLDER
#        value: uploads
      - key: EMAIL_PASSWORD
        sync: false
      - key: PORT
        value: 10000
      - key: SERVER_ADDRESS
        value: 0.0.0.0

databases:
  - name: nprrs-tagdog-backend-db
    databaseName: tagdog
    user: tagdog
    plan: free