spring.application.name=nprrs-tagdog-backend

spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

#app.storage.provider=${APP_STORAGE_PROVIDER:${STORAGE_TYPE:local}}
#app.storage.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}
#app.storage.local.base-path=${APP_STORAGE_LOCAL_BASE_PATH:uploads}
#app.storage.local.public-path=${APP_STORAGE_LOCAL_PUBLIC_PATH:/uploads}
#app.storage.firebase.bucket=${APP_STORAGE_FIREBASE_BUCKET:}
#app.storage.firebase.project-id=${APP_STORAGE_FIREBASE_PROJECT_ID:}
#app.storage.firebase.credentials-file=${APP_STORAGE_FIREBASE_CREDENTIALS_FILE:}
#app.storage.firebase.credentials-base64=${APP_STORAGE_FIREBASE_CREDENTIALS_BASE64:}
#app.storage.firebase.credentials-json=${APP_STORAGE_FIREBASE_CREDENTIALS_JSON:}
#app.storage.firebase.folder=${APP_STORAGE_FIREBASE_FOLDER:uploads}

sistema.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:true}
sistema.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@email.com}
sistema.admin.senha=${APP_BOOTSTRAP_ADMIN_PASSWORD:admin123}

security.jwt.secret=${SECURITY_JWT_SECRET:mysupersecretkeymysupersecretkey123!}
security.jwt.expiration=${SECURITY_JWT_EXPIRATION:900}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tag.dog.tcc@gmail.com
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.jpa.hibernate.ddl-auto=validate

server.address=0.0.0.0
server.port=${PORT:8080}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

server.forward-headers-strategy=framework
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

mqtt.broker-url=tcp://localhost:1883
mqtt.client-id=app-local
mqtt.username=
mqtt.password=

mqtt.clean-session=true
mqtt.automatic-reconnect=true
mqtt.keep-alive-interval=60
mqtt.connection-timeout=30
mqtt.default-qos=1

# mqtt.broker-url=ssl://meu-broker:8883
